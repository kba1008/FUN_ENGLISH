<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaca Kata - Belajar Inggeris</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background: linear-gradient(135deg, #4f46e5, #9333ea, #ec4899);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      animation: shine 6s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    .word-tile {
      transition: all 0.2s ease-in-out;
      cursor: pointer;
      user-select: none;
    }
    .word-tile:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
    .word-tile:active {
      transform: translateY(1px) scale(0.95);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
  </style>
</head>
<body class="text-white flex items-center justify-center p-4">

  <div id="app-container" class="w-full max-w-2xl mx-auto glass-panel rounded-3xl p-6 md:p-8 flex flex-col gap-6">
    
    <!-- Header / Stats Bar -->
    <header class="flex justify-between items-center border-b border-white/20 pb-4 hidden" id="header-section">
      <div class="flex items-center gap-2">
        <i data-lucide="user" class="text-white/80"></i>
        <span id="display-name" class="font-bold text-lg tracking-wide">Pelajar</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1 bg-white/20 px-3 py-1 rounded-full" title="Markah Terkumpul">
          <i data-lucide="star" class="text-yellow-300 w-4 h-4"></i>
          <span id="display-score" class="font-bold">0</span>
        </div>
        <button id="btn-settings" class="p-2 hover:bg-white/20 rounded-full transition" title="Tetapan">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
      </div>
    </header>

    <!-- Screen 1: Registration & Setup -->
    <section id="screen-setup" class="flex flex-col gap-5 text-center py-8">
      <i data-lucide="sparkles" class="w-16 h-16 mx-auto text-yellow-300 animate-pulse"></i>
      <h1 class="text-4xl font-extrabold drop-shadow-md">Kaca Kata</h1>
      <p class="text-white/80">Fahami Inggeris melalui Bahasa Melayu. Susun ayat dengan betul untuk mengumpul mata!</p>
      
      <div class="mt-6 flex flex-col gap-4 text-left">
        <div>
          <label class="block text-sm font-medium mb-1 pl-1">Nama Pelajar</label>
          <input type="text" id="input-name" placeholder="Masukkan nama anda di sini..." class="w-full bg-white/10 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
        </div>
      </div>

      <button id="btn-start-game" class="mt-4 bg-white text-purple-600 font-bold text-lg rounded-xl py-3 px-6 shadow-lg hover:bg-gray-100 transform transition active:scale-95">
        Mula Belajar
      </button>
    </section>

    <!-- Screen 2: Level Selection -->
    <section id="screen-levels" class="hidden flex flex-col gap-5 py-4">
      <h2 class="text-2xl font-bold text-center mb-4">Pilih Tahap Cabaran</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <button class="level-btn glass-panel p-6 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/20 transition" data-level="1">
          <i data-lucide="battery-low" class="w-10 h-10 text-green-300"></i>
          <span class="font-bold text-xl">Tahap 1</span>
          <span class="text-xs text-white/70 text-center">Mudah<br>(Tahun 1-3)</span>
        </button>
        <button class="level-btn glass-panel p-6 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/20 transition" data-level="2">
          <i data-lucide="battery-medium" class="w-10 h-10 text-yellow-300"></i>
          <span class="font-bold text-xl">Tahap 2</span>
          <span class="text-xs text-white/70 text-center">Sederhana<br>(Tahun 4-6)</span>
        </button>
        <button class="level-btn glass-panel p-6 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/20 transition" data-level="3">
          <i data-lucide="battery-full" class="w-10 h-10 text-red-300"></i>
          <span class="font-bold text-xl">Tahap 3</span>
          <span class="text-xs text-white/70 text-center">Sukar<br>(Sekolah Menengah)</span>
        </button>
      </div>
    </section>

    <!-- Screen 3: Gameplay -->
    <section id="screen-game" class="hidden flex flex-col gap-6">
      <!-- Loading State -->
      <div id="loading-indicator" class="hidden flex-col items-center justify-center py-10">
        <i data-lucide="loader-2" class="w-12 h-12 animate-spin text-white mb-4"></i>
        <p class="text-lg animate-pulse" id="loading-text">Cikgu AI sedang membina soalan...</p>
      </div>

      <!-- Game Content -->
      <div id="game-content" class="flex flex-col gap-6 hidden">
        <div class="text-center">
          <span class="inline-block bg-white/20 px-3 py-1 rounded-full text-sm font-semibold mb-3" id="current-level-badge">Tahap X</span>
          <h3 class="text-2xl md:text-3xl font-bold leading-tight drop-shadow-md text-yellow-300" id="malay-sentence">
            <!-- Malay sentence appears here -->
          </h3>
          <p class="text-sm text-white/70 mt-2"><i data-lucide="info" class="inline w-4 h-4"></i> Susun ayat Inggeris di bawah berdasarkan maksud ayat di atas.</p>
        </div>

        <!-- Answer Dropzone (Selected Words) -->
        <div class="bg-black/20 border-2 border-dashed border-white/40 rounded-2xl p-4 min-h-[100px] flex flex-wrap gap-2 items-center justify-center" id="answer-area">
          <!-- Selected words will move here -->
        </div>

        <!-- Controls -->
        <div class="flex justify-center gap-4">
           <button id="btn-check" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition flex items-center gap-2">
             <i data-lucide="check-circle-2" class="w-5 h-5"></i> Semak
           </button>
           <button id="btn-clear" class="bg-red-500/80 hover:bg-red-600/80 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition flex items-center gap-2">
             <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Semula
           </button>
        </div>

        <!-- Word Pool (Available Words) -->
        <div class="bg-white/10 rounded-2xl p-4 min-h-[120px] flex flex-wrap gap-3 items-center justify-center" id="word-pool">
          <!-- Shuffled words will appear here as tiles -->
        </div>
      </div>
    </section>

    <!-- Sync Status -->
    <div id="sync-status" class="absolute bottom-2 right-4 text-xs text-white/50 flex items-center gap-1">
      <i data-lucide="wifi" class="w-3 h-3" id="wifi-icon"></i>
      <span id="sync-text">Dalam Talian</span>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
